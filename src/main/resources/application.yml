spring:
  application:
    name: ledger

server:
  port: 8081

ledger:
  cluster-id: 1
  data-dir: ./data
  ring-buffer-size: 2048          # số slot ring (dev; tăng cho prod)
  max-accounts: 100000            # dev: cấp phát trước ~100K account. Prod: tăng + chỉnh -Xmx
  max-transfers: 1000000          # dev: ~1M transfer. Prod: tăng (vd 100M) kèm heap đủ lớn
  journal:
    segment-size-bytes: 268435456 # 256 MiB per segment
    fsync-batch: true             # batch fsync at endOfBatch
  snapshot:
    interval-seconds: 300         # checkpoint every 5 min

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.payments.ledger: INFO
